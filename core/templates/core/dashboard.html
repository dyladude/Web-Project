<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; }
        .tiles { display: flex; gap: 20px; }
        .tile {
            border: 1px solid #ccc;
            padding: 20px;
            width: 200px;
            text-align: center;
            border-radius: 8px;
        }
        .tile a {
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Dashboard</h1>

<div class="tiles">
    <div class="tile">
        <a href="/todos/">📝 Todos</a>
        <p>Manage your task list</p>
    </div>

    <div class="tile">
        <a href="/admin/">⚙ Admin</a>
        <p>Admin interface</p>
    </div>

    <div class="tile">
        <a href="/health/">❤️ Health Check</a>
        <p>Service status endpoint</p>
    </div>
</div>

<p>
    {% if user.is_authenticated %}
        Logged in as {{ user.username }} |
        <a href="/accounts/logout/">Logout</a>
    {% else %}
        <a href="/accounts/login/">Login</a>
    {% endif %}
</p>

</body>
</html>

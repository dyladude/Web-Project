{% extends "base.html" %}

{% block title %}Delete Todo{% endblock %}

{% block content %}

<h1>Delete Todo</h1>

<p>Are you sure you want to delete:</p>

<strong>{{ object.title }}</strong>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
</form>

<p>
    <a href="{% url 'todo-list' %}">Cancel</a>
</p>

{% endblock %}

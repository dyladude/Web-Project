{% extends "base.html" %}

{% block title %}Todo Form{% endblock %}

{% block content %}

<h1>
{% if object %}
Edit Todo
{% else %}
Create Todo
{% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Save</button>
</form>

<p>
    <a href="{% url 'todo-list' %}">Back to list</a>
</p>

{% endblock %}

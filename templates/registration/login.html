<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>

    {% if form.errors %}
      <p style="color: red;">Invalid username/password.</p>
    {% endif %}

    {% if next %}
      <p>You must log in to view that page.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Log in</button>
    </form>

    <p><a href="/admin/">Admin</a></p>
  </body>
</html>

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    depends_on:
      - db
    # Bind only to localhost on the VPS; nginx will proxy to it
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  pgdata: